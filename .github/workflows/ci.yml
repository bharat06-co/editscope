name: ci

on:
  push:
  pull_request:

jobs:
  freeze-and-soundness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install optional resolver deps
        run: pip install -r requirements.txt
      - name: Freeze tests (soundness invariant + cross-file W2)
        run: python -m scope_oracle.tests.test_audit_freeze
